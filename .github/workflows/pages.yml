name: Build & deploy static RRG to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Re-run weekly to refresh snapshots (Saturday 10:00 UTC).
    - cron: "0 10 * * 6"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" pandas numpy requests python-multipart pydantic

      - name: Build data snapshots
        working-directory: backend
        env:
          PYTHONUNBUFFERED: "1"
        run: python -m scripts.snapshot

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build Next.js (static export)
        working-directory: frontend
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_STATIC_MODE: "1"
          NEXT_PUBLIC_BASE_PATH: /relative-rotation-graph
        run: npm run build

      - name: Add .nojekyll (allow _next/*)
        run: touch frontend/out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
